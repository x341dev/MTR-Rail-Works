name: Unified CI/CD & Changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (ex. beta.1). Leave blank to use actual.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please (PR Gate)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-pack:
    name: Build & Pack (MC ${{ matrix.minecraft_version }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft_version: [1.17.1, 1.18.2, 1.19.2, 1.19.4, 1.20.1, 1.20.4]
    outputs:
      tag_name: ${{ steps.determine-tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read Manifest Version
        run: |
          if [ -f .release-please-manifest.json ]; then
            echo "MANIFEST_VERSION=$(jq -r '.["."]' .release-please-manifest.json)" >> $GITHUB_ENV
          else
            echo "MANIFEST_VERSION=" >> $GITHUB_ENV
            echo "Warning: .release-please-manifest.json not found. Skipping validation."
          fi

      - name: Read Gradle Version
        run: |
          GRADLE_VERSION=$(grep -E '^(mod_version|version)[[:space:]]*=[[:space:]]*' gradle.properties | cut -d= -f2 | tr -d '[:space:]' | tr -d '\r')
          echo "GRADLE_VERSION=$GRADLE_VERSION" >> $GITHUB_ENV

      - name: Verify Version Consistency
        run: |
          echo "manifest: ${MANIFEST_VERSION:-N/A} | gradle.properties: ${GRADLE_VERSION:-N/A}"
          if [ -n "$MANIFEST_VERSION" ] && [ -n "$GRADLE_VERSION" ] && [ "$MANIFEST_VERSION" != "$GRADLE_VERSION" ]; then
            echo "ERROR: .release-please-manifest.json ($MANIFEST_VERSION) does not match gradle.properties ($GRADLE_VERSION)"
            exit 1
          fi

      - name: Determine Tag Name
        id: determine-tag
        run: |
          if [ "${{ needs.release-please.outputs.release_created }}" = "true" ]; then
            echo "tag_name=${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            SUFFIX="${{ github.event.inputs.version_suffix }}"
            if [ -n "$SUFFIX" ]; then
              echo "tag_name=v${GRADLE_VERSION}-${SUFFIX}" >> $GITHUB_OUTPUT
            else
              echo "tag_name=v${GRADLE_VERSION}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Fabric and Forge Modules
        run: |
          for i in {1..3}; do
            ./gradlew fabric:build forge:build \
              --no-daemon \
              --stacktrace \
              "-PminecraftVersion=${{ matrix.minecraft_version }}" \
              "-Dorg.gradle.internal.http.socketTimeout=120000" \
              "-Dorg.gradle.internal.http.connectionTimeout=120000" && break || echo "Build failed, retrying in 10 seconds..." && sleep 10
            if [ $i -eq 3 ]; then
              exit 1
            fi
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtr-rail-works-jars-${{ matrix.minecraft_version }}
          path: build/release/*.jar
          retention-days: 7

  publish-github-release:
    name: Upload to GitHub Release Assets
    needs: [release-please, build-and-pack]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mtr-rail-works-jars-*
          path: ./ready-libs
          merge-multiple: true

      - name: Create Pre-Release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.build-and-pack.outputs.tag_name }}"
          gh release view "$TAG" || gh release create "$TAG" --prerelease --title "$TAG" --notes "Manual pre-release build"

      - name: Upload Files to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.build-and-pack.outputs.tag_name }}"
          echo "Searching for executables in ./ready-libs..."
          for file in ./ready-libs/*.jar; do
            if [ -f "$file" ]; then
              if [[ ! "$file" =~ (sources|dev|sources-dev|slim)\.jar$ ]]; then
                echo "Uploading asset: $file"
                gh release upload "$TAG" "$file" --clobber
              fi
            fi
          done
          
  publish-modrinth:
    name: Publish to Modrinth
    needs: [release-please, build-and-pack, publish-github-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mtr-rail-works-jars-*
          path: ./ready-libs
          merge-multiple: true

      - name: Clean Extra Jars
        run: |
          rm -f ./ready-libs/*-sources.jar ./ready-libs/*-dev.jar ./ready-libs/*-slim.jar

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v2
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-id: "xqd2bMI8"
          version-type: ${{ github.event_name == 'workflow_dispatch' && 'beta' || 'release' }}
          version: ${{ needs.build-and-pack.outputs.tag_name }}
          files: |
            ./ready-libs/*.jar
          game-versions: |
            1.17.1
            1.18.2
            1.19.2
            1.19.4
            1.20.1
            1.20.4
          loaders: |
            fabric
            forge
