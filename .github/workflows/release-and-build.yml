name: Unified CI/CD & Changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (ex. beta.1). Leave blank to use actual.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please (PR Gate)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: java

  build-and-pack:
    name: Build & Pack Jar
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'azul'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version consistency
        run: |
          MANIFEST_VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          GRADLE_VERSION=$(grep -E '^mod_version[[:space:]]*=[[:space:]]*' gradle.properties | cut -d= -f2 | tr -d '[:space:]' || grep -E '^version[[:space:]]*=[[:space:]]*' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          TXT_VERSION=$(cat version.txt | tr -d '[:space:]' || echo "")
          
          echo "manifest: $MANIFEST_VERSION | gradle.properties: $GRADLE_VERSION | version.txt: $TXT_VERSION"
          
          if [ -n "$GRADLE_VERSION" ] && [ "$MANIFEST_VERSION" != "$GRADLE_VERSION" ]; then
            echo "ERROR: .release-please-manifest.json ($MANIFEST_VERSION) does not match gradle.properties ($GRADLE_VERSION)"
            exit 1
          fi
          if [ -n "$TXT_VERSION" ] && [ "$MANIFEST_VERSION" != "$TXT_VERSION" ]; then
            echo "ERROR: .release-please-manifest.json ($MANIFEST_VERSION) does not match version.txt ($TXT_VERSION)"
            exit 1
          fi

      - name: Build with Gradle
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ -z "$VERSION" ] && [ -f version.txt ]; then
            VERSION=$(cat version.txt | tr -d '[:space:]')
            SUFFIX="${{ github.event.inputs.version_suffix }}"
            if [ -n "$SUFFIX" ]; then
              VERSION="${VERSION}-${SUFFIX}"
            fi
            echo "Manual run detected. Version: $VERSION"
          fi
          
          ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
          retention-days: 7

  publish-github-release:
    name: Upload Jar to GitHub Release Assets
    needs: [release-please, build-and-pack]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-jar
          path: ./ready-libs

      - name: Upload .jar to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR_FILE=$(ls ./ready-libs/*.jar | grep -vE '(sources|dev|sources-dev)\.jar$' | head -n 1)
          echo "Uploading $JAR_FILE to release ${{ needs.release-please.outputs.tag_name }}"
          gh release upload ${{ needs.release-please.outputs.tag_name }} "$JAR_FILE"