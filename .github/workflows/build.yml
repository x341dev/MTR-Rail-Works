name: Build
on: [ workflow_dispatch, push ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        minecraft: [ 1.16.5, 1.17.1, 1.18.2, 1.19.2, 1.20.1, 1.20.4 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Validate gradle wrapper
        uses: gradle/wrapper-validation-action@main
      - name: Setup JDK 21
        uses: actions/setup-java
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Prepare gradle wrapper
        run: chmod +x ./gradlew
      - name: Setup Fabric files
        run: ./gradlew fabric:setupFiles -PminecraftVersion="${{ matix.minecraft }}"
      - name: Setup Forge files
        run: ./gradlew forge:setupFiles -PminecraftVersion=
      - name: Build ${{ matix.minecraft }}
        run: ./gradlew build -PminecraftVersion="${{ matix.minecraft }}"
      - name: Build ${{ matix.minecraft }} (server)
        run: ./gradlew build -PminecraftVersion="${{ matix.minecraft }}" -PexludeAssets=true



