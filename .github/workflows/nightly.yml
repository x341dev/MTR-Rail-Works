name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (MC ${{ matrix.minecraft_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft_version: [1.17.1, 1.18.2, 1.19.2, 1.19.4, 1.20.1, 1.20.4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Fabric and Forge Modules
        run: |
          for i in {1..3}; do
            ./gradlew fabric:build forge:build "-PminecraftVersion=${{ matrix.minecraft_version }}" && break || echo "Build failed, retrying in 10 seconds..." && sleep 10
            if [ $i -eq 3 ]; then
              exit 1
            fi
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtr-rail-works-nightly-jars-${{ matrix.minecraft_version }}
          path: build/release/*.jar
          retention-days: 3

  release:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Current Date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mtr-rail-works-nightly-jars-*
          path: ./ready-libs
          merge-multiple: true

      - name: Delete Previous Nightly Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag || true

      - name: Create Nightly Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly --prerelease --title "Nightly Build (${{ steps.date.outputs.date }})" --notes "Automated nightly snapshot build across all supported Minecraft versions. This release is replaced every run." --target "${{ github.sha }}"

      - name: Upload Files to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in ./ready-libs/*.jar; do
            if [ -f "$file" ]; then
              if [[ ! "$file" =~ (sources|dev|sources-dev|slim)\.jar$ ]]; then
                echo "Uploading asset: $file"
                gh release upload nightly "$file" --clobber
              fi
            fi
          done
